<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行预算计算器</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--primary:#2563eb;--primary-light:#dbeafe;--accent:#f59e0b;--bg:#f8fafc;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--success:#10b981;--danger:#ef4444}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
  .container{max-width:720px;margin:0 auto}
  h1{text-align:center;font-size:1.6rem;margin-bottom:4px;color:var(--primary)}
  .subtitle{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:20px}
  .card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-group{display:flex;flex-direction:column;gap:6px}
  .form-group.full{grid-column:1/-1}
  label{font-size:.82rem;font-weight:600;color:var(--muted)}
  select,input[type=number]{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:.95rem;background:var(--bg);transition:border .2s}
  select:focus,input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
  .btn-row{display:flex;gap:10px;margin-top:6px}
  .btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;transition:transform .1s,box-shadow .2s}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3)}
  .btn-primary:hover{box-shadow:0 4px 14px rgba(37,99,235,.4)}
  .btn-reset{background:var(--border);color:var(--muted)}
  .btn-reset:hover{background:#cbd5e1}
  .result-card{background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff;border-radius:16px;padding:20px;margin-bottom:16px;display:none}
  .result-card.show{display:block;animation:fadeUp .4s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .result-total{text-align:center;margin-bottom:14px}
  .result-total .amount{font-size:2rem;font-weight:800}
  .result-total .label{font-size:.8rem;opacity:.85}
  .breakdown{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .breakdown-item{background:rgba(255,255,255,.15);border-radius:10px;padding:12px;text-align:center}
  .breakdown-item .bi-label{font-size:.72rem;opacity:.8;margin-bottom:2px}
  .breakdown-item .bi-value{font-size:1.1rem;font-weight:700}
  .breakdown-item.highlight{grid-column:1/-1;background:rgba(255,255,255,.25)}
  .per-person{margin-top:14px;text-align:center;font-size:.9rem;opacity:.9}
  .per-person strong{font-size:1.3rem}
  .chart-bar{margin-top:16px}
  .chart-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:.78rem}
  .chart-label{width:52px;text-align:right;opacity:.85;flex-shrink:0}
  .chart-track{flex:1;height:18px;background:rgba(255,255,255,.12);border-radius:9px;overflow:hidden}
  .chart-fill{height:100%;border-radius:9px;transition:width .6s ease}
  .chart-val{width:60px;opacity:.85;flex-shrink:0}
  .empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:.9rem}
  .empty-state .icon{font-size:2.4rem;margin-bottom:8px}
  @media(max-width:480px){
    .form-grid{grid-template-columns:1fr}
    .breakdown{grid-template-columns:1fr 1fr}
    h1{font-size:1.3rem}
    .result-total .amount{font-size:1.6rem}
    .breakdown-item .bi-value{font-size:.95rem}
  }
</style>
</head>
<body>
<div class="container">
  <h1>🌏 旅行预算计算器</h1>
  <p class="subtitle">选择目的地，快速估算旅行花费</p>

  <div class="card">
    <div class="form-grid">
      <div class="form-group full">
        <label>📍 目的地</label>
        <select id="dest">
          <option value="">请选择目的地</option>
          <option value="tokyo">东京 · 日本</option>
          <option value="bangkok">曼谷 · 泰国</option>
          <option value="singapore">新加坡</option>
          <option value="seoul">首尔 · 韩国</option>
          <option value="bali">巴厘岛 · 印尼</option>
          <option value="paris">巴黎 · 法国</option>
          <option value="london">伦敦 · 英国</option>
          <option value="newyork">纽约 · 美国</option>
          <option value="sydney">悉尼 · 澳洲</option>
          <option value="dubai">迪拜 · 阿联酋</option>
          <option value="sanya">三亚 · 中国</option>
          <option value="chengdu">成都 · 中国</option>
          <option value="lijiang">丽江 · 中国</option>
          <option value="xiamen">厦门 · 中国</option>
          <option value="hongkong">香港</option>
          <option value="taipei">台北</option>
        </select>
      </div>
      <div class="form-group">
        <label>📅 旅行天数</label>
        <input type="number" id="days" min="1" max="90" value="5" placeholder="天数">
      </div>
      <div class="form-group">
        <label>👥 出行人数</label>
        <input type="number" id="people" min="1" max="20" value="2" placeholder="人数">
      </div>
      <div class="form-group full">
        <label>💰 消费档次</label>
        <select id="tier">
          <option value="budget">经济出行 · 省钱优先</option>
          <option value="comfort" selected>舒适出行 · 性价比之选</option>
          <option value="luxury">豪华出行 · 品质享受</option>
        </select>
      </div>
    </div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn btn-primary" onclick="calc()">🧮 计算预算</button>
      <button class="btn btn-reset" onclick="reset()">↺ 重置</button>
    </div>
  </div>

  <div class="result-card" id="result">
    <div class="result-total">
      <div class="label">预估总费用</div>
      <div class="amount" id="totalAmount">¥0</div>
    </div>
    <div class="breakdown" id="breakdown"></div>
    <div class="per-person" id="perPerson"></div>
    <div class="chart-bar" id="chartBar"></div>
  </div>

  <div class="empty-state" id="empty">
    <div class="icon">🗺️</div>
    <div>选择目的地后点击「计算预算」<br>即可查看详细费用估算</div>
  </div>
</div>

<script>
const DATA={
  tokyo:{name:"东京",transport:[2500,4000,8000],hotel:[300,800,2500],food:[150,350,800],ticket:[100,200,400]},
  bangkok:{name:"曼谷",transport:[1500,2800,5500],hotel:[120,400,1200],food:[60,150,400],ticket:[50,100,250]},
  singapore:{name:"新加坡",transport:[2000,3500,7000],hotel:[350,900,2800],food:[120,300,700],ticket:[80,180,400]},
  seoul:{name:"首尔",transport:[1800,3200,6500],hotel:[280,700,2000],food:[120,280,650],ticket:[80,150,350]},
  bali:{name:"巴厘岛",transport:[2000,3500,6000],hotel:[150,500,1800],food:[50,120,350],ticket:[40,80,200]},
  paris:{name:"巴黎",transport:[4000,7000,15000],hotel:[500,1200,4000],food:[200,500,1200],ticket:[120,250,500]},
  london:{name:"伦敦",transport:[4500,8000,16000],hotel:[500,1100,3500],food:[180,450,1100],ticket:[120,250,500]},
  newyork:{name:"纽约",transport:[5000,9000,18000],hotel:[600,1400,4500],food:[200,500,1300],ticket:[120,250,550]},
  sydney:{name:"悉尼",transport:[3500,6000,12000],hotel:[400,1000,3000],food:[150,380,900],ticket:[100,200,450]},
  dubai:{name:"迪拜",transport:[3000,5500,11000],hotel:[300,900,3500],food:[100,280,800],ticket:[80,180,450]},
  sanya:{name:"三亚",transport:[800,1800,4000],hotel:[200,600,2000],food:[80,180,500],ticket:[50,100,250]},
  chengdu:{name:"成都",transport:[500,1200,3000],hotel:[120,350,1200],food:[60,120,350],ticket:[40,80,200]},
  lijiang:{name:"丽江",transport:[600,1500,3500],hotel:[100,300,1000],food:[50,100,300],ticket:[40,80,180]},
  xiamen:{name:"厦门",transport:[500,1200,3000],hotel:[150,400,1200],food:[60,120,350],ticket:[40,80,180]},
  hongkong:{name:"香港",transport:[1500,2800,5500],hotel:[400,1000,3000],food:[120,300,700],ticket:[80,150,350]},
  taipei:{name:"台北",transport:[1200,2200,5000],hotel:[250,650,2000],food:[80,200,500],ticket:[60,120,280]}
};
const TIER_IDX={budget:0,comfort:1,luxury:2};
const TIER_LABEL={budget:"经济",comfort:"舒适",luxury:"豪华"};
const COLORS={transport:"#3b82f6",hotel:"#8b5cf6",food:"#f59e0b",ticket:"#10b981",reserve:"#ef4444"};
const ITEM_LABEL={transport:"🚗 交通",hotel:"🏨 住宿",food:"🍜 餐饮",ticket:"🎫 门票",reserve:"🛡️ 备用金"};

function calc(){
  const dk=document.getElementById("dest").value;
  const days=parseInt(document.getElementById("days").value)||1;
  const people=parseInt(document.getElementById("people").value)||1;
  const tier=document.getElementById("tier").value;
  if(!dk){alert("请先选择目的地");return}
  const d=DATA[dk];
  const ti=TIER_IDX[tier];
  const transport=d.transport[ti];
  const hotel=d.hotel[ti]*days;
  const food=d.food[ti]*days*people;
  const ticket=d.ticket[ti]*days;
  const reserve=Math.round((transport+hotel+food+ticket)*0.1);
  const total=transport+hotel+food+ticket+reserve;
  const perPerson=Math.round(total/people);

  document.getElementById("totalAmount").textContent="¥"+total.toLocaleString();
  const items=[
    {key:"transport",value:transport},
    {key:"hotel",value:hotel},
    {key:"food",value:food},
    {key:"ticket",value:ticket},
    {key:"reserve",value:reserve}
  ];
  let html="";
  items.forEach(it=>{
    html+=`<div class="breakdown-item"><div class="bi-label">${ITEM_LABEL[it.key]}</div><div class="bi-value">¥${it.value.toLocaleString()}</div></div>`;
  });
  document.getElementById("breakdown").innerHTML=html;
  document.getElementById("perPerson").innerHTML=`👥 人均费用：<strong>¥${perPerson.toLocaleString()}</strong>（${people}人）<br><span style="font-size:.72rem;opacity:.7">${d.name} · ${days}天 · ${TIER_LABEL[tier]}档</span>`;

  // chart
  const maxVal=Math.max(...items.map(i=>i.value));
  let chartHtml="";
  items.forEach(it=>{
    const pct=maxVal?Math.round(it.value/maxVal*100):0;
    chartHtml+=`<div class="chart-row"><span class="chart-label">${ITEM_LABEL[it.key].slice(2)}</span><div class="chart-track"><div class="chart-fill" style="width:${pct}%;background:${COLORS[it.key]}"></div></div><span class="chart-val">¥${it.value.toLocaleString()}</span></div>`;
  });
  document.getElementById("chartBar").innerHTML=chartHtml;

  document.getElementById("result").classList.add("show");
  document.getElementById("empty").style.display="none";
}

function reset(){
  document.getElementById("dest").value="";
  document.getElementById("days").value=5;
  document.getElementById("people").value=2;
  document.getElementById("tier").value="comfort";
  document.getElementById("result").classList.remove("show");
  document.getElementById("empty").style.display="";
}

// auto-calc on change
document.querySelectorAll("#dest,#days,#people,#tier").forEach(el=>{
  el.addEventListener("change",calc);
  el.addEventListener("input",calc);
});
</script>
</body>
</html>
